# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e293021f1c9a29ccf22d1c95210c2fc4"
name = "srit-shop-ai-assit"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

[app_proxy]
# Storefront /apps/assistant/* → this URL. Shopify strips the subpath and
# appends the rest, so /apps/assistant/chat → <url>/chat.
# DEV: this is the ngrok tunnel to the local Express server (changes on restart).
url = "https://random-shrill-legacy.ngrok-free.dev/api/storefront"
prefix = "apps"
subpath = "assistant"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = ""

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]
